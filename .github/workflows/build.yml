name: Build and Release Ebill

on:
  push:
    tags:
      - "v*"
      - "test-v*"

# Required so GITHUB_TOKEN can create releases and upload assets
permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Windows — build .exe installer
  # ─────────────────────────────────────────────────────────────
  build-windows:
    if: ${{ vars.BUILD_WINDOWS == 'true' }}
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

#      - name: Setup Visual Studio Build Tools
#        uses: microsoft/setup-msbuild@v1

      - name: Setup MSVC Development Environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Building version: $VERSION"

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Flutter Pub Get
        run: flutter pub get

#      - name: Build Flutter Windows Release
#        run: flutter build windows --release
#        env:
#          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Build Windows Installer with FastForge
        run: fastforge package --platform windows --targets exe
        env:
          CMAKE_GENERATOR: "Visual Studio 17 2022"

      - name: Rename installer to Ebill
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          mkdir -p dist
          # FastForge may emit ebill-*, Ebill-Setup*, or legacy invoiso-*; normalize to ebill-<ver>-windows-setup.exe
          while IFS= read -r -d '' f; do
            dir=$(dirname "$f")
            mv "$f" "$dir/ebill-${VERSION}-windows-setup.exe"
            echo "Renamed to $dir/ebill-${VERSION}-windows-setup.exe"
          done < <(find dist -type f \( -name 'ebill-*-windows-setup.exe' -o -name 'Ebill-Setup*.exe' -o -name 'EbillSetup*.exe' -o -name 'invoiso-*-windows-setup.exe' -o -name 'Invoiso-Setup*.exe' \) -print0)
          count=$(find dist -name "ebill-*-windows-setup.exe" | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No Ebill Windows installer found in dist/"
            find dist -type f
            exit 1
          fi
          find dist -name "ebill-*-windows-setup.exe"

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Ebill-Windows-Installer
          path: dist/**/ebill-*-windows-setup.exe

  # ─────────────────────────────────────────────────────────────
  # Linux — build .deb package
  # ─────────────────────────────────────────────────────────────
  build-linux:
    if: ${{ vars.BUILD_LINUX_DEB22 == 'true' }}
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Setup build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev patchelf squashfs-tools

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Building version: $VERSION"

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Flutter Pub Get
        run: flutter pub get

#      - name: Build Flutter Linux Release
#        run: flutter build linux --release

      - name: Build .deb Package
        run: |
          fastforge package --platform linux --targets deb
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          DEB_FILE=$(find dist/$VERSION -name "*.deb" | head -1)
          echo "Found deb: $DEB_FILE"
          mv "$DEB_FILE" Ebill-$VERSION-ubuntu22.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: Ebill-Ubuntu22.deb
          path: Ebill-*-ubuntu22.deb

  # ─────────────────────────────────────────────────────────────
  # Linux — build .deb for Ubuntu 24.04
  # Compiled natively on ubuntu-24.04 for modern systems (e.g.
  # Ryzen 7000 series) running Ubuntu 24.04 (Noble).
  # ─────────────────────────────────────────────────────────────
  build-linux-ubuntu24:
    if: ${{ vars.BUILD_LINUX_DEB24 == 'true' }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Setup build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev patchelf squashfs-tools

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Building version: $VERSION"

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Flutter Pub Get
        run: flutter pub get

#      - name: Build Flutter Linux Release
#        run: flutter build linux --release

      - name: Build .deb Package
        run: |
          fastforge package --platform linux --targets deb
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          DEB_FILE=$(find dist/$VERSION -name "*.deb" | head -1)
          echo "Found deb: $DEB_FILE"

          # ── Inject libsqlite3.so and create LD_LIBRARY_PATH launcher ──────────
          # sqflite_common_ffi calls DynamicLibrary.open("libsqlite3.so") which
          # needs the unversioned symlink.  Ubuntu 24.04 only ships libsqlite3.so.0
          # in the runtime package; the unversioned name requires libsqlite3-dev.
          # Bundle it so the app always finds it regardless of what the user has
          # installed.
          mkdir -p /tmp/deb_root
          dpkg-deb -R "$DEB_FILE" /tmp/deb_root

          echo "--- deb contents ---"
          find /tmp/deb_root -type f | sort

          mkdir -p /tmp/deb_root/usr/share/ebill/lib

          LIBSQLITE=$(find /usr/lib -name "libsqlite3.so.0.*" | sort -V | tail -1)
          if [ -z "$LIBSQLITE" ]; then
            sudo apt-get install -y libsqlite3-dev
            LIBSQLITE=$(find /usr/lib -name "libsqlite3.so.0.*" | sort -V | tail -1)
          fi
          echo "Bundling libsqlite3: $LIBSQLITE"
          cp "$LIBSQLITE" /tmp/deb_root/usr/share/ebill/lib/libsqlite3.so
          echo "Injected libsqlite3.so into deb at /usr/share/ebill/lib/"

          mkdir -p /tmp/deb_root/usr/bin
          printf '#!/bin/sh\nexport LD_LIBRARY_PATH=/usr/share/ebill/lib:$LD_LIBRARY_PATH\nexec /usr/share/ebill/ebill "$@"\n' \
            > /tmp/deb_root/usr/bin/ebill
          chmod 755 /tmp/deb_root/usr/bin/ebill
          echo "Created LD_LIBRARY_PATH launcher at /usr/bin/ebill"

          dpkg-deb -b /tmp/deb_root "$DEB_FILE"
          echo "Repacked with LD_LIBRARY_PATH launcher"

          mv "$DEB_FILE" Ebill-$VERSION-ubuntu24.deb

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: Ebill-Ubuntu24.deb
          path: Ebill-*-ubuntu24.deb

  # ─────────────────────────────────────────────────────────────
  # Linux — build AppImage
  # ─────────────────────────────────────────────────────────────
  build-appimage:
    if: ${{ vars.BUILD_APPIMAGE22 == 'true' }}
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Setup build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev patchelf squashfs-tools

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Building version: $VERSION"

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Flutter Linux Release
        run: flutter build linux --release

      - name: Bundle libstdc++ into AppDir
        run: |
          # ubuntu-22.04 system libstdc++ already provides GLIBCXX_3.4.29
          LIBSTDCPP=$(find /usr/lib -name "libstdc++.so.6.0.*" | sort -V | tail -1)
          echo "Bundling libstdc++: $LIBSTDCPP"
          mkdir -p AppDir/usr/lib
          cp "$LIBSTDCPP" AppDir/usr/lib/libstdc++.so.6
          cp /usr/lib/x86_64-linux-gnu/libgcc_s.so.1 AppDir/usr/lib/

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/
          mkdir -p AppDir/usr/share/icons
          cp assets/deb/images/logo.png AppDir/usr/share/icons/logo.png

      - name: Install AppImage Builder
        run: |
          sudo apt-get install -y appstream file desktop-file-utils libfuse2 zsync
          pip install appimage-builder==1.1.0

      - name: Build AppImage
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i "/app_info:/,/^[^ ]/ s/^\(\s*version:\s*\)[0-9.]*$/\1$VERSION/" AppImageBuilder.yml
          appimage-builder --recipe AppImageBuilder.yml --skip-test

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Ebill-AppImage
          path: "*.AppImage"

  # ─────────────────────────────────────────────────────────────
  # Linux — build AppImage for Ubuntu 24.04
  # Compiled natively on ubuntu-24.04 (glibc 2.39) for modern
  # systems. Uses appimagetool directly instead of appimage-builder
  # to avoid Python 3.12 compatibility issues on Noble.
  # Bundles libstdc++ and libgcc_s; relies on system GTK/glib
  # which are standard on Ubuntu 24.04.
  # ─────────────────────────────────────────────────────────────
  build-appimage-ubuntu24:
    if: ${{ vars.BUILD_APPIMAGE24 == 'true' }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Setup build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev patchelf squashfs-tools \
            desktop-file-utils wget

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Building version: $VERSION"

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Flutter Linux Release
        run: flutter build linux --release

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/lib AppDir/usr/share/icons

          # Copy Flutter bundle
          cp -r build/linux/x64/release/bundle/. AppDir/usr/bin/

          # Bundle libstdc++ (provides GLIBCXX symbols required by Syncfusion)
          LIBSTDCPP=$(find /usr/lib -name "libstdc++.so.6.0.*" | sort -V | tail -1)
          echo "Bundling libstdc++: $LIBSTDCPP"
          cp "$LIBSTDCPP" AppDir/usr/lib/libstdc++.so.6

          # Bundle libgcc_s
          cp /usr/lib/x86_64-linux-gnu/libgcc_s.so.1 AppDir/usr/lib/

          # Bundle libsqlite3.so — sqflite_common_ffi calls
          # DynamicLibrary.open("libsqlite3.so") (unversioned).  Ubuntu only
          # ships libsqlite3.so.0 in the runtime package so we bundle it here.
          LIBSQLITE=$(find /usr/lib -name "libsqlite3.so.0.*" | sort -V | tail -1)
          if [ -z "$LIBSQLITE" ]; then
            sudo apt-get install -y libsqlite3-dev
            LIBSQLITE=$(find /usr/lib -name "libsqlite3.so.0.*" | sort -V | tail -1)
          fi
          echo "Bundling libsqlite3: $LIBSQLITE"
          cp "$LIBSQLITE" AppDir/usr/lib/libsqlite3.so

          # Icons
          cp assets/deb/images/logo.png AppDir/usr/share/icons/logo.png
          cp assets/deb/images/logo.png AppDir/logo.png

      - name: Create AppRun and desktop entry
        run: |
          cat > AppDir/AppRun << 'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${HERE}/usr/bin/lib:${LD_LIBRARY_PATH}"
          exec "${HERE}/usr/bin/ebill" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/ebill.desktop << 'EOF'
          [Desktop Entry]
          Name=Ebill
          Exec=ebill
          Icon=logo
          Type=Application
          Categories=Office;
          Terminal=false
          EOF

      - name: Build AppImage with appimagetool
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"

          wget -q -O /tmp/appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x /tmp/appimagetool.AppImage

          ARCH=x86_64 APPIMAGE_EXTRACT_AND_RUN=1 \
            /tmp/appimagetool.AppImage AppDir \
            "Ebill-${VERSION}-ubuntu24-x86_64.AppImage"

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Ebill-AppImage-Ubuntu24
          path: "Ebill-*-ubuntu24-x86_64.AppImage"


  # ─────────────────────────────────────────────────────────────
  # macOS — build .dmg installer
  # ─────────────────────────────────────────────────────────────
  build-macos:
    if: ${{ vars.BUILD_MACOS == 'true' }}
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.8'
          cache: true

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          sed -i '' "s/^version: .*/version: $VERSION/" pubspec.yaml
          echo "Building version: $VERSION"

      - name: Install FastForge
        run: dart pub global activate fastforge

      - name: Flutter Pub Get
        run: flutter pub get

#      - name: Build Flutter macOS Release
#        run: flutter build macos --release

      - name: Install appdmg
        run: npm install -g appdmg

      - name: Create .icns for DMG volume icon
        run: |
          ICONSET=macos/packaging/dmg/AppIcon.iconset
          mkdir -p "$ICONSET"
          APPICONSET=macos/Runner/Assets.xcassets/AppIcon.appiconset
          cp "$APPICONSET/app_icon_16.png"   "$ICONSET/icon_16x16.png"
          cp "$APPICONSET/app_icon_32.png"   "$ICONSET/icon_16x16@2x.png"
          cp "$APPICONSET/app_icon_32.png"   "$ICONSET/icon_32x32.png"
          cp "$APPICONSET/app_icon_64.png"   "$ICONSET/icon_32x32@2x.png"
          cp "$APPICONSET/app_icon_128.png"  "$ICONSET/icon_128x128.png"
          cp "$APPICONSET/app_icon_256.png"  "$ICONSET/icon_128x128@2x.png"
          cp "$APPICONSET/app_icon_256.png"  "$ICONSET/icon_256x256.png"
          cp "$APPICONSET/app_icon_512.png"  "$ICONSET/icon_256x256@2x.png"
          cp "$APPICONSET/app_icon_512.png"  "$ICONSET/icon_512x512.png"
          cp "$APPICONSET/app_icon_1024.png" "$ICONSET/icon_512x512@2x.png"
          iconutil -c icns "$ICONSET" -o macos/packaging/dmg/AppIcon.icns

      - name: Build macOS DMG with FastForge
        run: fastforge package --platform macos --targets dmg

      - name: Rename DMG
        run: |
          DMG=$(find dist -name "*.dmg" | head -1)
          if [ -z "$DMG" ]; then
            echo "ERROR: No DMG found in dist/"
            find dist -type f
            exit 1
          fi
          VERSION="${GITHUB_REF#refs/tags/}"
          VERSION="${VERSION#test-v}"
          VERSION="${VERSION#v}"
          FINAL_DMG="dist/ebill-${VERSION}-macos.dmg"
          mv "$DMG" "$FINAL_DMG"
          echo "Renamed to: $FINAL_DMG"

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: Ebill-macOS
          path: dist/ebill-*-macos.dmg

  # ─────────────────────────────────────────────────────────────
  # Release — collect artifacts and publish GitHub Release
  # Runs only after all three build jobs succeed
  # ─────────────────────────────────────────────────────────────
  create-release:
    needs: [build-windows, build-linux, build-linux-ubuntu24, build-appimage, build-appimage-ubuntu24, build-macos]
    if: always() && (vars.EBILL_RELEASE == 'true' || vars.INVOISO_RELEASE == 'true') # Prefer EBILL_RELEASE; keep INVOISO_RELEASE for existing repo vars
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Ebill-Windows-Installer
          path: release-assets/
        continue-on-error: true


      - name: Download Ubuntu22 .deb
        uses: actions/download-artifact@v4
        with:
          name: Ebill-Ubuntu22.deb
          path: release-assets/
        continue-on-error: true

      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: Ebill-AppImage
          path: release-assets/
        continue-on-error: true

      - name: Download Ubuntu24 .deb
        uses: actions/download-artifact@v4
        with:
          name: Ebill-Ubuntu24.deb
          path: release-assets/
        continue-on-error: true

      - name: Download Ubuntu24 AppImage
        uses: actions/download-artifact@v4
        with:
          name: Ebill-AppImage-Ubuntu24
          path: release-assets/
        continue-on-error: true

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: Ebill-macOS
          path: release-assets/
        continue-on-error: true

      - name: List release assets
        run: find release-assets -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Ebill ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: release-assets/**
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
