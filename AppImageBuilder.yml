version: 1

AppDir:
  path: ./AppDir
  app_info:
    id: com.invoiso
    name: Invoiso
    icon: logo
    version: 1.0.0
    exec: usr/bin/invoiso
    exec_args: $@

  apt:
    arch: amd64
    sources:
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu focal main restricted universe'
        key_url: 'http://keyserver.ubuntu.com/pks/lookup?op=get&search=0x3B4FE6ACC0B21F32'
      - sourceline: 'deb [arch=amd64] http://archive.ubuntu.com/ubuntu focal-updates main restricted universe'
    include:
      - libglib2.0-0
      - libgtk-3-0
      - libpango-1.0-0
      - libcairo2
      - libdbus-1-3
      - libx11-6
      - libxcb1
      - libasound2
      - libgcc-s1
    exclude:
      - dpkg
      - perl

  runtime:
    env:
      PATH: $APPDIR/usr/bin:$PATH
      # Bundled libstdc++ (GLIBCXX_3.4.29) takes priority over system version
      LD_LIBRARY_PATH: $APPDIR/usr/lib:$APPDIR/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH

AppImage:
  arch: x86_64
  update-information: None
  sign-key: None
